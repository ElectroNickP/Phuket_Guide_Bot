services:
  redis:
    image: redis:alpine
    container_name: best_sea_redis
    restart: always
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning

  bot:
    build: .
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./google service account:/app/google service account
    env_file:
      - .env
    restart: always
    depends_on:
      - redis

volumes:
  redis_data:
